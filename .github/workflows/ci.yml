name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  flutter:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Cache Pub
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('pubspec.lock') }}

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/build.gradle*', 'android/**/gradle-wrapper.properties') }}

      - name: Install Flutter (pinned to .metadata)
        shell: bash
        run: |
          set -euo pipefail
          REVISION=$(python3 - <<'PY'
          import re
          text = open('.metadata', 'r', encoding='utf-8').read()
          m = re.search(r'revision:\s*"([0-9a-f]+)"', text)
          if not m:
              raise SystemExit('Could not find Flutter revision in .metadata')
          print(m.group(1))
          PY
          )
          echo "Using Flutter revision: ${REVISION}"

          git clone --depth 1 --branch stable https://github.com/flutter/flutter.git "$HOME/flutter"
          cd "$HOME/flutter"
          git fetch --depth 1 origin "${REVISION}"
          git checkout "${REVISION}"

          echo "$HOME/flutter/bin" >> "$GITHUB_PATH"
          flutter --version

      - name: Pub get
        run: flutter pub get

      - name: Format (check)
        run: dart format --output=none --set-exit-if-changed lib test

      - name: Analyze
        run: flutter analyze

      - name: Custom lint (guardrails)
        run: flutter pub run custom_lint

      - name: Test
        run: flutter test


      - name: Configure Android signing (optional)
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p android/app
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/upload-keystore.jks

          cat > android/key.properties <<EOF
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          storeFile=app/upload-keystore.jks
          EOF

      - name: Build AAB (staging)
        run: flutter build appbundle --flavor staging --release --dart-define=APP_ENV=staging

      - name: Build AAB (prod)
        run: flutter build appbundle --flavor prod --release --dart-define=APP_ENV=prod

  ios-build:
    runs-on: macos-14
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Pub
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('pubspec.lock') }}

      - name: Install Flutter (pinned to .metadata)
        shell: bash
        run: |
          set -euo pipefail
          REVISION=$(python3 - <<'PY'
          import re
          text = open('.metadata', 'r', encoding='utf-8').read()
          m = re.search(r'revision:\s*"([0-9a-f]+)"', text)
          if not m:
              raise SystemExit('Could not find Flutter revision in .metadata')
          print(m.group(1))
          PY
          )
          echo "Using Flutter revision: ${REVISION}"

          git clone --depth 1 --branch stable https://github.com/flutter/flutter.git "$HOME/flutter"
          cd "$HOME/flutter"
          git fetch --depth 1 origin "${REVISION}"
          git checkout "${REVISION}"

          echo "$HOME/flutter/bin" >> "$GITHUB_PATH"
          flutter --version

      - name: CocoaPods version
        run: pod --version

      - name: Pub get
        run: flutter pub get

      - name: Build iOS simulator app
        run: flutter build ios --simulator

      - name: Boot simulator, install, and launch
        shell: bash
        run: |
          set -euo pipefail
          UDID=$(python3 - <<'PY'
          import json, subprocess, re

          data = json.loads(subprocess.check_output([
              'xcrun', 'simctl', 'list', 'devices', 'available', '-j'
          ]).decode('utf-8'))

          devices = []
          for runtime, ds in data.get('devices', {}).items():
              for d in ds:
                  if not d.get('isAvailable', False):
                      continue
                  if not d.get('deviceTypeIdentifier', '').startswith('com.apple.CoreSimulator.SimDeviceType.iPhone'):
                      continue
                  devices.append((runtime, d.get('name', ''), d.get('udid', '')))

          if not devices:
              raise SystemExit('No available iPhone simulators found')

          def score(item):
              runtime, name, _ = item
              m = re.search(r'iOS-(\d+)-(\d+)', runtime)
              major = int(m.group(1)) if m else 0
              minor = int(m.group(2)) if m else 0
              pref = 1 if 'iPhone 15' in name else 0
              return (major, minor, pref)

          runtime, name, udid = max(devices, key=score)
          if not udid:
              raise SystemExit('Selected simulator has no UDID')
          print(udid)
          PY
          )
          echo "Using simulator UDID: ${UDID}"

          xcrun simctl boot "${UDID}" || true
          xcrun simctl bootstatus "${UDID}" -b

          APP_PATH="build/ios/iphonesimulator/Runner.app"
          test -d "${APP_PATH}"
          xcrun simctl install "${UDID}" "${APP_PATH}"
          xcrun simctl launch "${UDID}" "se.fyndloppis.fyndLoppis"
