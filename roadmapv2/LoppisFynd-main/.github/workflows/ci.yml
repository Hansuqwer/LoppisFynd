name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  flutter:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Cache Pub
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('pubspec.lock') }}

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/build.gradle*', 'android/**/gradle-wrapper.properties') }}

      - name: Install Flutter (pinned to .metadata)
        shell: bash
        run: |
          set -euo pipefail
          REVISION=$(python3 - <<'PY'
          import re
          text = open('.metadata', 'r', encoding='utf-8').read()
          m = re.search(r'revision:\s*"([0-9a-f]+)"', text)
          if not m:
              raise SystemExit('Could not find Flutter revision in .metadata')
          print(m.group(1))
          PY
          )
          echo "Using Flutter revision: ${REVISION}"

          git clone --depth 1 --branch stable https://github.com/flutter/flutter.git "$HOME/flutter"
          cd "$HOME/flutter"
          git fetch --depth 1 origin "${REVISION}"
          git checkout "${REVISION}"

          echo "$HOME/flutter/bin" >> "$GITHUB_PATH"
          flutter --version

      - name: Pub get
        run: flutter pub get

      - name: Format (check)
        run: dart format --output=none --set-exit-if-changed lib test

      - name: Analyze
        run: flutter analyze

      - name: Custom lint (guardrails)
        run: flutter pub run custom_lint

      - name: Test
        run: flutter test


      - name: Configure Android signing (optional)
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p android/app
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/upload-keystore.jks

          cat > android/key.properties <<EOF
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          storeFile=app/upload-keystore.jks
          EOF

      - name: Build AAB (staging)
        run: flutter build appbundle --flavor staging --release --dart-define=APP_ENV=staging

      - name: Build AAB (prod)
        run: flutter build appbundle --flavor prod --release --dart-define=APP_ENV=prod
